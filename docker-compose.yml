services:
  postgres:
    image: postgres:16
    container_name: duca-ctf-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: duca
      POSTGRES_PASSWORD: duca
      POSTGRES_DB: duca_ctf
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U duca -d duca_ctf"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: duca-ctf-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
  redisdata:
